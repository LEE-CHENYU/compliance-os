<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"></head>
<body>
<div class="slide slide-dark">

  <div>
    <div class="section-label">第二步 · 填写和邮寄</div>
    <div class="headline-md" style="margin-top: 16px;">Guardian 帮你<br/>搞定前两步</div>
  </div>

  <div class="checklist" style="flex: 1; margin-top: 48px; display: flex; flex-direction: column; justify-content: center;">
    <div class="check-item">
      <div class="check-box on"></div>
      <div class="check-text"><span class="bright">填写信息</span><span class="sub">姓名、签证、学校、在美天数</span></div>
    </div>
    <div class="check-item">
      <div class="check-box on"></div>
      <div class="check-text"><span class="bright">生成 PDF</span><span class="sub">自动填入 IRS 官方模板，直接下载</span></div>
    </div>
    <div class="check-item">
      <div class="check-box wait"></div>
      <div class="check-text"><span class="bright">打印 + 签名</span><span class="sub">你需要自己完成这步</span></div>
    </div>
    <div class="check-item">
      <div class="check-box wait"></div>
      <div class="check-text"><span class="bright">邮寄到 IRS</span><span class="sub">Austin, TX · 地址会显示在生成页</span></div>
    </div>
  </div>

  <div>
    <div class="hbox">
      <p>Form 8843 <span class="bright">不能电子提交</span>。必须打印签名后邮寄纸质版。</p>
    </div>

    <div class="watermark" style="margin-top: 40px;">
      <svg width="44" height="44" viewBox="0 0 120 120"><polygon points="60,10 105,36 60,62 15,36" fill="#f0f4fc" opacity="0.5"/><polygon points="15,36 60,62 60,108 15,82" fill="#4A7AE8" opacity="0.3"/><polygon points="105,36 60,62 60,108 105,82" fill="#5B8DEE" opacity="0.3"/></svg>
      <div class="wm-name">Guardian</div>
    </div>
  </div>

</div>
</body></html>
