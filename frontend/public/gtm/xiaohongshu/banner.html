<!DOCTYPE html>
<html lang="zh"><head><meta charset="UTF-8"><link rel="stylesheet" href="shared.css"></head>
<body>
<div class="slide slide-cover glow-tr glow-bl">

  <!-- Top: Logo lockup -->
  <div style="display: flex; align-items: center; gap: 28px; position: relative; z-index: 1;">
    <svg width="88" height="88" viewBox="0 0 120 120">
      <defs><linearGradient id="cl" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#c4d4ea"/><stop offset="50%" stop-color="#4A7AE8"/><stop offset="100%" stop-color="#2A4DB0"/></linearGradient><linearGradient id="cr" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#dce6f3"/><stop offset="50%" stop-color="#5B8DEE"/><stop offset="100%" stop-color="#3461C7"/></linearGradient></defs>
      <polygon points="60,10 105,36 60,62 15,36" fill="#f0f4fc"/><polygon points="15,36 60,62 60,108 15,82" fill="url(#cl)"/><polygon points="105,36 60,62 60,108 105,82" fill="url(#cr)"/>
      <line x1="15" y1="51.3" x2="60" y2="77.3" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/><line x1="15" y1="66.7" x2="60" y2="92.7" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
      <line x1="105" y1="51.3" x2="60" y2="77.3" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/><line x1="105" y1="66.7" x2="60" y2="92.7" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    </svg>
    <div>
      <div style="font-size: 56px; font-weight: 800;">Guardian</div>
      <div style="font-size: 28px; color: #6b82a8; letter-spacing: 0.08em;">留学生 · 创业者 · 新移民</div>
    </div>
  </div>

  <!-- Center: Value prop -->
  <div style="position: relative; z-index: 1;">
    <div style="font-size: 48px; color: #8cb4ff; font-weight: 600;">Immigration × Tax × Corporate</div>
    <div class="headline" style="margin-top: 20px;">一站式移民<br/>合规检查平台</div>
    <div class="accent-line" style="margin-top: 40px;"></div>
    <div class="body-text" style="margin-top: 40px; color: #a0b3cc;">
      从 F-1 学生到创业者<br/>
      Guardian 帮你交叉检查每一份文件
    </div>
  </div>

  <!-- Bottom: Persona cards -->
  <div class="persona-grid">
    <div class="persona">
      <div class="persona-icon">🎓</div>
      <div>
        <div class="persona-label">留学生</div>
        <div class="persona-desc">Form 8843, 1040-NR, OPT</div>
      </div>
    </div>
    <div class="persona">
      <div class="persona-icon">💼</div>
      <div>
        <div class="persona-label">职场新人</div>
        <div class="persona-desc">H-1B, FBAR, 税务合规</div>
      </div>
    </div>
    <div class="persona">
      <div class="persona-icon">🚀</div>
      <div>
        <div class="persona-label">创业者</div>
        <div class="persona-desc">O-1, EB-1, 83(b), Entity</div>
      </div>
    </div>
  </div>

</div>
</body></html>
