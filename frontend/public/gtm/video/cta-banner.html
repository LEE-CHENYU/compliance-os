<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 1920px;
    height: 1080px;
    background: #060d1a;
    font-family: -apple-system, "SF Pro Display", "Helvetica Neue", sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  /* ── Ambient background glows ─────────────────────────────────── */
  .glow-left {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,122,232,0.18) 0%, transparent 70%);
    top: 50%; left: 10%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  .glow-right {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74,122,232,0.10) 0%, transparent 70%);
    top: 30%; right: 8%;
    transform: translate(50%, -50%);
    pointer-events: none;
  }
  .glow-bottom {
    position: absolute;
    width: 900px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(ellipse, rgba(44,77,176,0.12) 0%, transparent 70%);
    bottom: -100px; left: 50%;
    transform: translateX(-50%);
    pointer-events: none;
  }

  /* ── Subtle grid overlay ───────────────────────────────────────── */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(74,122,232,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(74,122,232,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
    pointer-events: none;
  }

  /* ── Main layout ───────────────────────────────────────────────── */
  .stage {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    text-align: center;
  }

  /* ── Cube icon ─────────────────────────────────────────────────── */
  .icon-wrap {
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.2s forwards;
    margin-bottom: 40px;
  }
  .cube-float {
    animation: float 4s ease-in-out 1s infinite;
  }

  /* ── Wordmark ──────────────────────────────────────────────────── */
  .wordmark {
    font-size: 112px;
    font-weight: 800;
    color: #f0f4fc;
    letter-spacing: -0.02em;
    line-height: 1;
    opacity: 0;
    animation: fadeUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.55s forwards;
  }

  /* ── Tagline ───────────────────────────────────────────────────── */
  .tagline {
    font-size: 36px;
    font-weight: 400;
    color: #6b82a8;
    letter-spacing: 0.04em;
    margin-top: 20px;
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.85s forwards;
  }

  /* ── Divider ───────────────────────────────────────────────────── */
  .divider {
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4A7AE8, transparent);
    margin: 48px auto;
    opacity: 0;
    animation: expandLine 0.8s cubic-bezier(0.22,1,0.36,1) 1.1s forwards;
  }

  /* ── Value props row ───────────────────────────────────────────── */
  .props {
    display: flex;
    gap: 80px;
    align-items: center;
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 1.4s forwards;
    margin-bottom: 64px;
  }
  .prop {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .prop-label {
    font-size: 22px;
    color: #8cb4ff;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .prop-desc {
    font-size: 18px;
    color: #4a5f80;
  }
  .prop-sep {
    width: 1px;
    height: 48px;
    background: rgba(74,122,232,0.25);
  }

  /* ── CTA pill ──────────────────────────────────────────────────── */
  .cta-wrap {
    opacity: 0;
    animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) 1.65s forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }
  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    padding: 22px 56px;
    background: linear-gradient(135deg, #4A7AE8, #2A4DB0);
    border-radius: 60px;
    font-size: 32px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.01em;
    box-shadow: 0 0 48px rgba(74,122,232,0.4), 0 8px 32px rgba(0,0,0,0.4);
    animation: pulse 2.5s ease-in-out 2.3s infinite;
  }
  .cta-url {
    font-size: 26px;
    color: #4a6a9a;
    letter-spacing: 0.06em;
    font-weight: 400;
  }

  /* ── Free badge ────────────────────────────────────────────────── */
  .free-badge {
    position: absolute;
    top: -18px;
    right: -24px;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #fff;
    font-size: 16px;
    font-weight: 700;
    padding: 6px 16px;
    border-radius: 20px;
    letter-spacing: 0.08em;
    box-shadow: 0 4px 16px rgba(34,197,94,0.4);
  }

  /* ── Animations ────────────────────────────────────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes expandLine {
    from { width: 0; opacity: 0; }
    to   { width: 600px; opacity: 1; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50%       { transform: translateY(-12px); }
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 48px rgba(74,122,232,0.4), 0 8px 32px rgba(0,0,0,0.4); }
    50%       { box-shadow: 0 0 80px rgba(74,122,232,0.7), 0 8px 40px rgba(0,0,0,0.5); }
  }
</style>
</head>
<body>

<div class="glow-left"></div>
<div class="glow-right"></div>
<div class="glow-bottom"></div>
<div class="grid"></div>

<div class="stage">

  <!-- Cube icon -->
  <div class="icon-wrap">
    <div class="cube-float">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <defs>
          <linearGradient id="cl" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#c4d4ea"/>
            <stop offset="50%" stop-color="#4A7AE8"/>
            <stop offset="100%" stop-color="#2A4DB0"/>
          </linearGradient>
          <linearGradient id="cr" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#dce6f3"/>
            <stop offset="50%" stop-color="#5B8DEE"/>
            <stop offset="100%" stop-color="#3461C7"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <polygon points="60,10 105,36 60,62 15,36" fill="#f0f4fc" filter="url(#glow)"/>
        <polygon points="15,36 60,62 60,108 15,82" fill="url(#cl)"/>
        <polygon points="105,36 60,62 60,108 105,82" fill="url(#cr)"/>
        <line x1="15" y1="51.3" x2="60" y2="77.3" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
        <line x1="15" y1="66.7" x2="60" y2="92.7" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/>
        <line x1="105" y1="51.3" x2="60" y2="77.3" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
        <line x1="105" y1="66.7" x2="60" y2="92.7" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
      </svg>
    </div>
  </div>

  <!-- Wordmark -->
  <div class="wordmark">Guardian</div>

  <!-- Tagline -->
  <div class="tagline">Immigration × Tax × Corporate — Cross-checked together</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Value props -->
  <div class="props">
    <div class="prop">
      <div class="prop-label">Free to start</div>
      <div class="prop-desc">Form 8843 generator, doc check</div>
    </div>
    <div class="prop-sep"></div>
    <div class="prop">
      <div class="prop-label">Professional services</div>
      <div class="prop-desc">Attorney + EA reviewed, from $29</div>
    </div>
    <div class="prop-sep"></div>
    <div class="prop">
      <div class="prop-label">For immigrants</div>
      <div class="prop-desc">Students · H-1B · Founders</div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <div style="position:relative; display:inline-block;">
      <div class="cta-btn">
        Try Guardian Free →
      </div>
      <div class="free-badge">FREE</div>
    </div>
    <div class="cta-url">guardian-compliance.fly.dev</div>
  </div>

</div>
</body>
</html>
