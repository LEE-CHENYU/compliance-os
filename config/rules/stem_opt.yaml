version: "1.0.0"

rules:
  # === Comparison rules (fire when cross-check finds a mismatch) ===

  - id: job_title_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: job_title
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Job title mismatch between I-983 and employment letter"
      action: "File an amended I-983 with your DSO using your actual current title"
      consequence: "RFE trigger"
      immigration_impact: true

  - id: location_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Work location on I-983 doesn't match employment letter"
      action: "Submit a modified I-983 reflecting your actual work location"
      consequence: "DHS site visit failure"
      immigration_impact: true

  - id: salary_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: compensation
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Compensation differs between I-983 and employment letter"
      action: "File a modified I-983 reporting the material change"
      consequence: "Unreported material change"
      immigration_impact: true

  - id: start_date_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: start_date
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Employment start date doesn't match I-983"
      action: "Verify correct date with DSO and file correction if needed"
      consequence: "Unauthorized employment gap"
      immigration_impact: true

  - id: employer_name_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: employer_name
        operator: mismatch
        source: comparison
    severity: critical
    finding:
      title: "Employer name doesn't match between documents"
      action: "Ensure I-983 employer name exactly matches E-Verify enrollment"
      consequence: "Authorization invalid"
      immigration_impact: true

  - id: duties_low_relevance
    track: stem_opt
    type: comparison
    conditions:
      - field: duties
        operator: lt
        value: 0.6
        source: comparison
    severity: warning
    finding:
      title: "Job duties may not clearly relate to your STEM degree"
      action: "Work with employer to revise I-983 training plan with STEM-specific goals"
      consequence: "Major-relatedness failure"
      immigration_impact: true

  # === Logic rules (fire based on extracted dates + answers) ===

  - id: i983_evaluation_due
    track: stem_opt
    type: logic
    conditions:
      - field: start_date
        operator: lt
        value: "12_months_ago"
        source: extraction_a
      - field: stage
        operator: eq
        value: "stem_opt"
        source: answers
    severity: warning
    finding:
      title: "12-month I-983 self-evaluation may be due"
      action: "Complete evaluation with employer signature within 10 days of anniversary"
      consequence: "SEVIS termination risk"
      immigration_impact: true

  - id: grace_period_employment
    track: stem_opt
    type: logic
    conditions:
      - field: end_date
        operator: lt
        value: "today"
        source: extraction_a
      - field: stage
        operator: neq
        value: "stem_opt"
        source: answers
    severity: critical
    finding:
      title: "OPT may have ended — you cannot work during the 60-day grace period"
      action: "Stop working immediately if OPT has ended without STEM extension"
      consequence: "Unauthorized employment"
      immigration_impact: true

  # === Answer-based logic rules (no documents needed) ===

  - id: unemployment_risk
    track: stem_opt
    type: logic
    conditions:
      - field: employment_status
        operator: in
        value: ["not_employed", "between_jobs"]
        source: answers
      - field: stage
        operator: in
        value: ["stem_opt", "opt"]
        source: answers
    severity: warning
    finding:
      title: "Unemployment days are accumulating"
      action: "OPT allows 90 days total unemployment. STEM OPT allows 150 days cumulative. Track your days carefully and seek employment before the limit."
      consequence: "Status termination risk"
      immigration_impact: true

  - id: employer_change_unreported
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: in
        value: ["stem_opt", "opt"]
        source: answers
    severity: warning
    finding:
      title: "Employer change must be reported and documented"
      action: "Report the change to your DSO within 10 days. On STEM OPT, file a new I-983 with the new employer before starting work. Verify the new employer is E-Verify enrolled."
      consequence: "Unauthorized employment"
      immigration_impact: true

  - id: employer_change_stem_i983
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "stem_opt"
        source: answers
    severity: warning
    finding:
      title: "New I-983 required for employer change on STEM OPT"
      action: "A new I-983 must be filed with your new employer before you start working. The new employer must be enrolled in E-Verify."
      consequence: "STEM authorization invalid"
      immigration_impact: true

  - id: h1b_employer_change
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: warning
    finding:
      title: "H-1B transfer required for employer change"
      action: "Your new employer must file a new H-1B petition before you start working. You can begin work once the petition is received by USCIS."
      consequence: "Unauthorized employment"
      immigration_impact: true

  - id: h1b_unemployment
    track: stem_opt
    type: logic
    conditions:
      - field: employment_status
        operator: in
        value: ["not_employed", "between_jobs"]
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: critical
    finding:
      title: "H-1B requires active employment — status at risk"
      action: "H-1B status is tied to your employer. Without employment, you have a limited grace period (up to 60 days). Seek new employment or change status immediately."
      consequence: "Immediate status loss"
      immigration_impact: true

  - id: h1b_pending_no_travel
    track: stem_opt
    type: logic
    conditions:
      - field: petition_status
        operator: eq
        value: "pending"
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: warning
    finding:
      title: "Avoid international travel while H-1B is pending"
      action: "Traveling outside the US while your H-1B change of status is pending can result in abandonment of the petition. Consult an attorney before any travel."
      consequence: "Petition abandonment"
      immigration_impact: true

  - id: i140_employer_change_portability
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "i140"
        source: answers
    severity: warning
    finding:
      title: "I-140 portability depends on approval and timing"
      action: "If your I-140 has been approved and pending for 180+ days, you may port to a new employer under AC21. If not yet approved, the employer change may require a new petition."
      consequence: "Priority date at risk"
      immigration_impact: true

  - id: i140_pending_limited_options
    track: stem_opt
    type: logic
    conditions:
      - field: petition_status
        operator: eq
        value: "pending"
        source: answers
      - field: stage
        operator: eq
        value: "i140"
        source: answers
    severity: info
    finding:
      title: "I-140 pending — limited job portability"
      action: "Until your I-140 is approved for 180 days, you cannot freely change employers while keeping your priority date. Plan accordingly."
      consequence: "Portability restricted"
      immigration_impact: true

  # === Tax filing risk rules (from intake answers) ===

  - id: wrong_tax_form_risk
    track: stem_opt
    type: logic
    conditions:
      - field: tax_software_used
        operator: in
        value: ["turbotax", "hr_block", "freetaxusa"]
        source: answers
      - field: years_in_us
        operator: lt
        value: 6
        source: answers
    severity: warning
    finding:
      title: "You may have filed the wrong tax form"
      action: "TurboTax cannot file Form 1040-NR at all. Other software may default to Form 1040 (resident return) instead of 1040-NR. If you were in your first 5 years in the US on F-1, you likely needed 1040-NR. This may need to be amended."
      consequence: "Amended returns needed"
      immigration_impact: true

  - id: foreign_accounts_fbar_risk
    track: stem_opt
    type: logic
    conditions:
      - field: has_foreign_accounts
        operator: eq
        value: "yes"
        source: answers
      - field: is_nra
        operator: neq
        value: "yes"
        source: answers
    severity: warning
    finding:
      title: "Foreign bank accounts may require FBAR filing"
      action: "If your foreign accounts exceeded $10K in combined value at any point during the year, you must file FinCEN Form 114 (FBAR) by April 15 (auto-extended to Oct 15). Penalty for non-filing: up to $16,536/year (non-willful) or 50% of balance (willful)."
      consequence: "Up to 50% of balance"
      immigration_impact: false

  - id: foreign_gifts_3520_risk
    track: stem_opt
    type: logic
    conditions:
      - field: received_foreign_gifts
        operator: eq
        value: "yes"
        source: answers
      - field: is_nra
        operator: neq
        value: "yes"
        source: answers
    severity: warning
    finding:
      title: "Large gifts from abroad may require Form 3520"
      action: "If you received gifts or inheritances from a foreign person totaling over $100K in a year, you must file Form 3520. Penalty: 25% of the unreported amount. This applies even if the money was for tuition or living expenses."
      consequence: "25% penalty"
      immigration_impact: false

  - id: form_8843_missing
    track: stem_opt
    type: logic
    conditions:
      - field: filed_8843
        operator: eq
        value: "no"
        source: answers
      - field: years_in_us
        operator: lt
        value: 6
        source: answers
    severity: info
    finding:
      title: "Form 8843 may not have been filed"
      action: "All F-1 and J-1 visa holders must file Form 8843 every year, even with zero income. This form claims your exempt individual status under the Substantial Presence Test. Check if your previous tax preparer included it."
      consequence: "Required filing"
      immigration_impact: false

  # === Government benefit / public charge rules ===

  - id: subsidized_health_plan_visa
    track: stem_opt
    type: logic
    conditions:
      - field: has_govt_health_plan
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: in
        value: ["opt", "stem_opt", "h1b"]
        source: answers
    severity: warning
    finding:
      title: "Government-subsidized health plan while on visa"
      action: "Free or subsidized government health plans (Essential Plan, Medicaid, Medi-Cal) may be inconsistent with the financial self-sufficiency requirement of your visa status. While most health benefits are excluded from public charge determinations, enrollment as a non-citizen on F-1/H-1B can raise eligibility questions during status change or H-1B adjudication. Consult an immigration attorney."
      consequence: "Status change risk"
      immigration_impact: true

  - id: govt_benefit_h1b_adjudication
    track: stem_opt
    type: logic
    conditions:
      - field: has_govt_health_plan
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: in
        value: ["h1b", "i140"]
        source: answers
    severity: warning
    finding:
      title: "Prior government benefit may complicate H-1B/I-140 adjudication"
      action: "If you received a government-subsidized health plan (e.g., Essential Plan at $0 premium, Medicaid) while on a student or work visa, USCIS may question this during H-1B or green card adjudication. Gather documentation showing your eligibility basis and consult an immigration attorney before filing."
      consequence: "RFE or denial risk"
      immigration_impact: true

  - id: multistate_health_enrollment
    track: stem_opt
    type: logic
    conditions:
      - field: has_multistate_health
        operator: eq
        value: "yes"
        source: answers
    severity: warning
    finding:
      title: "Health plan enrollment in multiple states"
      action: "Enrolling in health plans in different states (e.g., NY Essential Plan + Covered California) raises address consistency issues. Your health insurance state should match your actual state of residence. Mismatched states can trigger questions about tax residency, AR-11 compliance, and benefit eligibility."
      consequence: "Residency inconsistency"
      immigration_impact: true

  # === Advisory rules (gated on user situation) ===

  - id: advisory_fbar
    track: stem_opt
    type: advisory
    conditions:
      - field: is_nra
        operator: neq
        value: "yes"
        source: answers
    severity: info
    finding:
      title: "FBAR (FinCEN 114)"
      action: "Do you have foreign bank accounts over $10K total?"
      consequence: "Up to $100K fine"
      immigration_impact: true

  - id: advisory_fatca_8938
    track: stem_opt
    type: advisory
    conditions:
      - field: is_nra
        operator: neq
        value: "yes"
        source: answers
    severity: info
    finding:
      title: "Form 8938"
      action: "Do you hold foreign assets over $50K?"
      consequence: "$10K+ penalty"
      immigration_impact: true

  - id: advisory_ar11
    track: stem_opt
    type: advisory
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: info
    finding:
      title: "AR-11"
      action: "Did you report your address change to USCIS?"
      consequence: "Affects green card"
      immigration_impact: true

  - id: advisory_multistate_tax
    track: stem_opt
    type: advisory
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: info
    finding:
      title: "State tax filing"
      action: "Are you working in a different state than your employer?"
      consequence: "Back taxes owed"
      immigration_impact: false
