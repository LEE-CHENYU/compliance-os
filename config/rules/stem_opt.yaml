version: "1.0.0"

rules:
  # === Comparison rules (fire when cross-check finds a mismatch) ===

  - id: job_title_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: job_title
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Job title mismatch between I-983 and employment letter"
      action: "File an amended I-983 with your DSO using your actual current title"
      consequence: "RFE trigger"
      immigration_impact: true

  - id: location_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Work location on I-983 doesn't match employment letter"
      action: "Submit a modified I-983 reflecting your actual work location"
      consequence: "DHS site visit failure"
      immigration_impact: true

  - id: salary_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: compensation
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Compensation differs between I-983 and employment letter"
      action: "File a modified I-983 reporting the material change"
      consequence: "Unreported material change"
      immigration_impact: true

  - id: start_date_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: start_date
        operator: mismatch
        source: comparison
    severity: warning
    finding:
      title: "Employment start date doesn't match I-983"
      action: "Verify correct date with DSO and file correction if needed"
      consequence: "Unauthorized employment gap"
      immigration_impact: true

  - id: employer_name_mismatch
    track: stem_opt
    type: comparison
    conditions:
      - field: employer_name
        operator: mismatch
        source: comparison
    severity: critical
    finding:
      title: "Employer name doesn't match between documents"
      action: "Ensure I-983 employer name exactly matches E-Verify enrollment"
      consequence: "Authorization invalid"
      immigration_impact: true

  - id: duties_low_relevance
    track: stem_opt
    type: comparison
    conditions:
      - field: duties
        operator: lt
        value: 0.6
        source: comparison
    severity: warning
    finding:
      title: "Job duties may not clearly relate to your STEM degree"
      action: "Work with employer to revise I-983 training plan with STEM-specific goals"
      consequence: "Major-relatedness failure"
      immigration_impact: true

  # === Logic rules (fire based on extracted dates + answers) ===

  - id: i983_evaluation_due
    track: stem_opt
    type: logic
    conditions:
      - field: start_date
        operator: lt
        value: "12_months_ago"
        source: extraction_a
      - field: stage
        operator: eq
        value: "stem_opt"
        source: answers
    severity: warning
    finding:
      title: "12-month I-983 self-evaluation may be due"
      action: "Complete evaluation with employer signature within 10 days of anniversary"
      consequence: "SEVIS termination risk"
      immigration_impact: true

  - id: grace_period_employment
    track: stem_opt
    type: logic
    conditions:
      - field: end_date
        operator: lt
        value: "today"
        source: extraction_a
      - field: stage
        operator: neq
        value: "stem_opt"
        source: answers
    severity: critical
    finding:
      title: "OPT may have ended — you cannot work during the 60-day grace period"
      action: "Stop working immediately if OPT has ended without STEM extension"
      consequence: "Unauthorized employment"
      immigration_impact: true

  # === Answer-based logic rules (no documents needed) ===

  - id: unemployment_risk
    track: stem_opt
    type: logic
    conditions:
      - field: employment_status
        operator: in
        value: ["not_employed", "between_jobs"]
        source: answers
      - field: stage
        operator: in
        value: ["stem_opt", "opt"]
        source: answers
    severity: warning
    finding:
      title: "Unemployment days are accumulating"
      action: "OPT allows 90 days total unemployment. STEM OPT allows 150 days cumulative. Track your days carefully and seek employment before the limit."
      consequence: "Status termination risk"
      immigration_impact: true

  - id: employer_change_unreported
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: in
        value: ["stem_opt", "opt"]
        source: answers
    severity: warning
    finding:
      title: "Employer change must be reported and documented"
      action: "Report the change to your DSO within 10 days. On STEM OPT, file a new I-983 with the new employer before starting work. Verify the new employer is E-Verify enrolled."
      consequence: "Unauthorized employment"
      immigration_impact: true

  - id: employer_change_stem_i983
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "stem_opt"
        source: answers
    severity: warning
    finding:
      title: "New I-983 required for employer change on STEM OPT"
      action: "A new I-983 must be filed with your new employer before you start working. The new employer must be enrolled in E-Verify."
      consequence: "STEM authorization invalid"
      immigration_impact: true

  - id: h1b_employer_change
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: warning
    finding:
      title: "H-1B transfer required for employer change"
      action: "Your new employer must file a new H-1B petition before you start working. You can begin work once the petition is received by USCIS."
      consequence: "Unauthorized employment"
      immigration_impact: true

  - id: h1b_unemployment
    track: stem_opt
    type: logic
    conditions:
      - field: employment_status
        operator: in
        value: ["not_employed", "between_jobs"]
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: critical
    finding:
      title: "H-1B requires active employment — status at risk"
      action: "H-1B status is tied to your employer. Without employment, you have a limited grace period (up to 60 days). Seek new employment or change status immediately."
      consequence: "Immediate status loss"
      immigration_impact: true

  - id: h1b_pending_no_travel
    track: stem_opt
    type: logic
    conditions:
      - field: petition_status
        operator: eq
        value: "pending"
        source: answers
      - field: stage
        operator: eq
        value: "h1b"
        source: answers
    severity: warning
    finding:
      title: "Avoid international travel while H-1B is pending"
      action: "Traveling outside the US while your H-1B change of status is pending can result in abandonment of the petition. Consult an attorney before any travel."
      consequence: "Petition abandonment"
      immigration_impact: true

  - id: i140_employer_change_portability
    track: stem_opt
    type: logic
    conditions:
      - field: employer_changed
        operator: eq
        value: "yes"
        source: answers
      - field: stage
        operator: eq
        value: "i140"
        source: answers
    severity: warning
    finding:
      title: "I-140 portability depends on approval and timing"
      action: "If your I-140 has been approved and pending for 180+ days, you may port to a new employer under AC21. If not yet approved, the employer change may require a new petition."
      consequence: "Priority date at risk"
      immigration_impact: true

  - id: i140_pending_limited_options
    track: stem_opt
    type: logic
    conditions:
      - field: petition_status
        operator: eq
        value: "pending"
        source: answers
      - field: stage
        operator: eq
        value: "i140"
        source: answers
    severity: info
    finding:
      title: "I-140 pending — limited job portability"
      action: "Until your I-140 is approved for 180 days, you cannot freely change employers while keeping your priority date. Plan accordingly."
      consequence: "Portability restricted"
      immigration_impact: true

  # === Advisory rules (gated on user situation) ===

  - id: advisory_fbar
    track: stem_opt
    type: advisory
    conditions:
      - field: years_in_us
        operator: gt
        value: 5
        source: answers
    severity: info
    finding:
      title: "FBAR (FinCEN 114)"
      action: "Do you have foreign bank accounts over $10K total?"
      consequence: "Up to $100K fine"
      immigration_impact: true

  - id: advisory_fatca_8938
    track: stem_opt
    type: advisory
    conditions:
      - field: years_in_us
        operator: gt
        value: 5
        source: answers
    severity: info
    finding:
      title: "Form 8938"
      action: "Do you hold foreign assets over $50K?"
      consequence: "$10K+ penalty"
      immigration_impact: true

  - id: advisory_ar11
    track: stem_opt
    type: advisory
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: info
    finding:
      title: "AR-11"
      action: "Did you report your address change to USCIS?"
      consequence: "Affects green card"
      immigration_impact: true

  - id: advisory_multistate_tax
    track: stem_opt
    type: advisory
    conditions:
      - field: work_location
        operator: mismatch
        source: comparison
    severity: info
    finding:
      title: "State tax filing"
      action: "Are you working in a different state than your employer?"
      consequence: "Back taxes owed"
      immigration_impact: false
